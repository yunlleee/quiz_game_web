<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Game (2P)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>QUIZ GAME (2P)</h1>
      <p>Web Quiz Game for 2 players</p>
    </header>

    <main class="card">
      <section id="menuScreen" class="screen active">
        <h2>Let's Start!</h2>
        <div class="menu-buttons">
          <button id="startBtn">Start Quiz</button>
          <button id="exitBtn" class="secondary">Exit</button>
        </div>
        <p id="menuMessage" class="message"></p>
      </section>

      <section id="quizScreen" class="screen">
        <div class="top-bar">
          <div class="badge" id="playerTurn">Player 1 Turn</div>
          <div class="scoreboard">
            <span id="score1">Player 1: 0</span>
            <span id="score2">Player 2: 0</span>
          </div>
        </div>

        <div class="progress" id="progressText">Question 1</div>

        <div class="question-box">
          <h2 id="questionTitle">Question will be displayed here.</h2>
          <p id="questionType" class="sub"></p>

          <div id="optionsBox" class="options"></div>

          <div id="blankBox" class="blank-box hidden">
            <input type="text" id="blankInput" placeholder="Enter the answer" />
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn">Submit Answer</button>
        </div>

        <p id="feedback" class="message"></p>
      </section>

      <section id="resultScreen" class="screen">
        <h2>Final Scores</h2>
        <div class="result-box">
          <p id="finalScore1"></p>
          <p id="finalScore2"></p>
          <h3 id="winnerText"></h3>
        </div>
        <div class="menu-buttons">
          <button id="restartBtn">Play Again</button>
          <button id="backMenuBtn" class="secondary">Back to Menu</button>
        </div>
      </section>
    </main>
  </div>

  <script src="js.js"></script>
</body>
</html>
